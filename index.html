<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brána</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="mist">
    <div class="gate">

        <div class="runes">
            ✧ ᚨ ✦ ᚱ ✧ ᛞ ✦ ᚨ ✧
        </div>

        <h1>Brána západní síně</h1>

        <div id="dialog" class="dialog">
            <p class="gate-text">
                Cizinče...
            </p>

            <p class="gate-text">
                Mnozí stáli před touto branou a nevěděli, jak vstoupit.
            </p>

            <p class="gate-text">
                Nehledej sílu. Nehledej moc.
            </p>

            <p class="gate-text">
                Promluv slovo, které sdílejí přátelé.
            </p>
        </div>

        <div class="input-area">
            <input
                type="password"
                id="password"
                placeholder="..."
                autocomplete="off"
            >

            <button id="enterBtn">
                Promluvit
            </button>
        </div>

        <p id="response" class="response"></p>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
